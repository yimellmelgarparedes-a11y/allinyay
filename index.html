<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALLINYAY - Amigurumi con Alma</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <i class="fa-solid fa-heart-pulse"></i> 
            <div><h1>ALLINYAY</h1><p>Amigurumi con alma</p></div>
        </div>
        <nav>
            <button id="btn-open-admin"><i class="fa-solid fa-user-gear"></i> Admin</button>
            <button id="btn-acceso-santuario"><i class="fa-solid fa-lock"></i> Entrar</button>
        </nav>
    </header>

    <main class="main-content">
        <section class="card-display">
            <div id="santuario-avatar-container" class="avatar-view">🔒</div>
            <h2 id="santuario-display-title">Santuario Privado</h2>
            <div id="santuario-body-content" class="content-body">
                <div id="memories-container"></div>
            </div>
        </section>
    </main>

    <div id="admin-modal" class="modal">
        <div class="modal-box">
            <div id="admin-login-view">
                <input type="password" id="admin-password" placeholder="Clave Admin">
                <button onclick="validarAdmin()">Validar</button>
            </div>
            <div id="admin-form-view" style="display:none;">
                <form id="form-nuevo-santuario">
                    <input type="text" id="admin-santuario-id" placeholder="Código ID" required>
                    <input type="text" id="admin-nombre" placeholder="Nombre" required>
                    <div class="avatar-picker">
                        <button type="button" onclick="setAvatar('👴')">👴</button>
                        <button type="button" onclick="setAvatar('👵')">👵</button>
                        <button type="button" onclick="setAvatar('👶')">👶</button>
                    </div>
                    <input type="file" id="admin-avatar-file" accept="image/*">
                    <input type="hidden" id="selected-avatar-val" value="👴">
                    <button type="submit">Guardar Santuario</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
